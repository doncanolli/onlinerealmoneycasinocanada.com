<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="url(#bg)" rx="6"/>
  
  <!-- Canadian flag stripe -->
  <rect x="0" y="0" width="32" height="4" fill="#ff0000"/>
  
  <!-- Casino chip design -->
  <circle cx="16" cy="18" r="10" fill="#ff0000" stroke="#ffffff" stroke-width="2"/>
  <circle cx="16" cy="18" r="6" fill="none" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Maple leaf symbol -->
  <text x="16" y="23" text-anchor="middle" fill="#ffffff" font-size="8" font-family="Arial">🍁</text>
  
  <!-- Casino dots -->
  <circle cx="12" cy="14" r="1" fill="#ffffff"/>
  <circle cx="20" cy="14" r="1" fill="#ffffff"/>
  <circle cx="12" cy="22" r="1" fill="#ffffff"/>
  <circle cx="20" cy="22" r="1" fill="#ffffff"/>
</svg>
